<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <h2>Créer un compte</h2>
        <form id="registerForm">
            <label for="first_name">Prénom</label>
            <input type="text" id="first_name" name="first_name" placeholder="Entrez votre prénom" required>

            <label for="last_name">Nom</label>
            <input type="text" id="last_name" name="last_name" placeholder="Entrez votre nom" required>

            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" placeholder="Choisissez un nom d'utilisateur" required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="Choisissez un mot de passe" required>

            <button type="submit">Créer le compte</button>
        </form>
        <p id="message"></p>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
